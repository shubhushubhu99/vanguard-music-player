<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate to Vanguard Project</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3E%3Crect width='30' height='30' rx='7' fill='%234ff828'/%3E%3Cg transform='translate(3, 3)'%3E%3Cpath d='M9 18V5l12-2v13M9 9l12-2' stroke='%23000' stroke-width='2.5' fill='none'/%3E%3Ccircle cx='6' cy='18' r='3.2' fill='%23000'/%3E%3Ccircle cx='18' cy='16' r='3.2' fill='%23000'/%3E%3C/g%3E%3C/svg%3E" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #000000;
            --vanguard-green: #4ff828;
            --vanguard-green-dim: rgba(79, 248, 40, 0.15);
            --vanguard-green-glow: rgba(79, 248, 40, 0.4);
            --text-main: #ffffff;
            --text-secondary: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .music-pattern {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -3;
            background-image: url("data:image/svg+xml,%3Csvg width='150' height='150' viewBox='0 0 150 150' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%234ff828' fill-opacity='0.06'%3E%3Cpath d='M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z' transform='translate(20,20) scale(1.5) rotate(15)'/%3E%3Cpath d='M22 3H10v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h10v6.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V3z' transform='translate(80,40) scale(1.2) rotate(-10)'/%3E%3Cpath d='M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z' transform='translate(40,100) scale(1.3) rotate(-20)'/%3E%3Cpath d='M22 3H10v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h10v6.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V3z' transform='translate(110,110) scale(1.4) rotate(15)'/%3E%3C/g%3E%3C/svg%3E");
            background-size: 150px 150px;
            animation: scroll-pattern 40s linear infinite;
        }

        @keyframes scroll-pattern {
            0% { background-position: 0 0; }
            100% { background-position: 150px 150px; }
        }

        .neon-blur-circle {
            position: absolute;
            width: 60vw;
            height: 60vw;
            max-width: 800px;
            max-height: 800px;
            background: var(--vanguard-green);
            top: 50%;
            left: 50%;
            border-radius: 50%;
            filter: blur(160px);
            opacity: 0.25;
            z-index: -2;
            pointer-events: none;
            animation: float-around 20s ease-in-out infinite;
        }

        @keyframes float-around {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.2; }
            25% { transform: translate(-20%, -25%) scale(1.2); opacity: 0.35; }
            50% { transform: translate(-80%, -75%) scale(0.9); opacity: 0.15; }
            75% { transform: translate(-30%, -85%) scale(1.1); opacity: 0.3; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.2; }
        }

        .container {
            max-width: 700px;
            width: 90%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .app-icon {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 28px;
            filter: drop-shadow(0 20px 20px rgba(0, 0, 0, 0.8)) drop-shadow(0 0 15px rgba(79, 248, 40, 0.2));
            animation: float 6s ease-in-out infinite;
            display: block;
        }

        @keyframes float {
            0% { transform: translateY(0px); filter: drop-shadow(0 20px 20px rgba(0, 0, 0, 0.8)) drop-shadow(0 0 15px rgba(79, 248, 40, 0.2)); }
            50% { transform: translateY(-12px); filter: drop-shadow(0 30px 25px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 25px rgba(79, 248, 40, 0.4)); }
            100% { transform: translateY(0px); filter: drop-shadow(0 20px 20px rgba(0, 0, 0, 0.8)) drop-shadow(0 0 15px rgba(79, 248, 40, 0.2)); }
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 18px;
            color: var(--text-main);
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 span {
            background: linear-gradient(135deg, #ffffff 0%, var(--vanguard-green) 50%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            position: relative;
        }
        
        h1 span::after {
            content: "Vanguard";
            position: absolute;
            left: 0; top: 0;
            z-index: -1;
            background: none;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px var(--vanguard-green-glow);
        }

        .description {
            font-size: 18px;
            line-height: 1.7;
            color: var(--text-secondary);
            font-weight: 300;
            max-width: 540px;
            margin: 0 auto 48px auto;
        }

        .description strong {
            color: #ffffff;
            font-weight: 600;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .donate-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .donate-wrapper::before {
            content: "";
            position: absolute;
            width: 180px;
            height: 40px;
            background: var(--vanguard-green);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 20px;
            filter: blur(25px);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
            pointer-events: none;
        }

        .donate-wrapper:hover::before {
            opacity: 0.5;
        }

        .donate-wrapper a {
            display: block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease;
        }

        .donate-wrapper a:hover {
            transform: scale(1.06) translateY(-2px);
            filter: brightness(1.15);
        }

        .donate-wrapper img {
            display: block;
            filter: drop-shadow(0 15px 15px rgba(0, 0, 0, 0.6));
        }

        @media (max-width: 768px) {
            h1 { font-size: 40px; }
            .description { font-size: 16px; padding: 0 20px; }
            .app-icon { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>

    <div class="music-pattern"></div>

    <div class="neon-blur-circle"></div>

    <div class="container">
        <img src="vanguard_player_icon.png" alt="Vanguard Player Icon" class="app-icon">

        <h1><span>Vanguard</span> Player</h1>
        
        <p class="description">
            <strong>Vanguard Player</strong> is an open-source music player designed for a simple, ad-free listening experience. If you enjoy the project, consider supporting its development. It helps bring new features, improvements, and keeps the project alive.
        </p>

        <div class="donate-wrapper">
            <a href="https://buymeachai.ezee.li/vanguard_dev" target="_blank" rel="noopener noreferrer">
                <img src="https://buymeachai.ezee.li/assets/images/buymeachai-button.png" alt="Buy Me A Chai" width="200">
            </a>
        </div>
    </div>

</body>
</html>
